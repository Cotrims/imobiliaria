<!doctype html>

<html
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  layout:decorate="~{layout}"
>
  <head>
    <meta charset="UTF-8" />
  </head>

  <body>
    <section layout:fragment="content">
      <div class="mx-auto w-full max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
        <div
          class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between"
        >
          <div class="flex items-center gap-3">
            <div
              class="flex h-10 w-10 items-center justify-center rounded-lg bg-slate-900 text-white"
            >
              <ion-icon name="document-text-outline" class="text-xl"></ion-icon>
            </div>

            <div>
              <h1
                class="text-2xl font-bold text-slate-900"
                th:text="#{proposta.listar.label}"
              >
                Listar Propostas
              </h1>

              <p
                class="mt-1 text-sm text-slate-500"
                th:text="#{proposta.listar.description}"
              >
                Consulte as propostas de compra cadastradas no sistema.
              </p>
            </div>
          </div>

          <a
            th:href="@{/propostas/cadastrar}"
            class="inline-flex items-center justify-center gap-2 rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-800"
            role="button"
          >
            <ion-icon name="add-outline" class="text-lg"></ion-icon>
            <span th:text="#{proposta.nova.label}">Nova Proposta</span>
          </a>
        </div>

        <div th:replace="~{fragments/alert}"></div>

        <div
          class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm"
        >
          <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-slate-200">
              <thead class="bg-slate-50">
                <tr>
                  <th
                    scope="col"
                    class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500"
                  >
                    #
                  </th>

                  <th
                    scope="col"
                    class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500"
                    th:text="#{sidebar.titulo.cliente}"
                  >
                    Cliente
                  </th>

                  <th
                    scope="col"
                    class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500"
                    th:text="#{sidebar.titulo.imovel}"
                  >
                    Imóvel
                  </th>

                  <th
                    scope="col"
                    class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500"
                    th:text="#{imovel.cidade.label}"
                  >
                    Cidade
                  </th>

                  <th
                    scope="col"
                    class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500"
                    th:text="#{proposta.valor.label}"
                  >
                    Valor da proposta
                  </th>

                  <th
                    scope="col"
                    class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500"
                    th:text="#{proposta.condicoesPagamento.label}"
                  >
                    Condições de pagamento
                  </th>

                  <th
                    scope="col"
                    class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500"
                    th:text="#{proposta.data.label}"
                  >
                    Data
                  </th>

                  <th
                    scope="col"
                    class="px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-500"
                    th:text="#{proposta.status.label}"
                  >
                    Status
                  </th>

                  <th
                    scope="col"
                    class="px-4 py-3 text-right text-xs font-semibold uppercase tracking-wide text-slate-500"
                    th:text="#{acao.label}"
                  >
                    Ação
                  </th>
                </tr>
              </thead>

              <tbody class="divide-y divide-slate-100 bg-white">
                <tr
                  th:each="propostaCompra : ${propostas}"
                  class="transition hover:bg-slate-50"
                >
                  <td
                    class="whitespace-nowrap px-4 py-3 text-sm font-medium text-slate-900"
                    th:text="${propostaCompra.id}"
                  ></td>

                  <td
                    class="whitespace-nowrap px-4 py-3 text-sm text-slate-600"
                    th:text="${propostaCompra.cliente.nome}"
                  ></td>

                  <td class="max-w-xs px-4 py-3 text-sm text-slate-600">
                    <span
                      class="line-clamp-2"
                      th:text="${propostaCompra.imovel.endereco}"
                    ></span>
                  </td>

                  <td
                    class="whitespace-nowrap px-4 py-3 text-sm text-slate-600"
                    th:text="${propostaCompra.imovel.cidade.nome}"
                  ></td>

                  <td
                    class="whitespace-nowrap px-4 py-3 text-sm font-medium text-slate-700"
                    th:text="${#numbers.formatCurrency(propostaCompra.valorProposta)}"
                  ></td>

                  <td class="max-w-sm px-4 py-3 text-sm text-slate-600">
                    <span
                      class="line-clamp-2"
                      th:text="${propostaCompra.condicoesPagamento}"
                    ></span>
                  </td>

                  <td
                    class="whitespace-nowrap px-4 py-3 text-sm text-slate-600"
                    th:text="${#temporals.format(propostaCompra.dataProposta, 'dd/MM/yyyy HH:mm')}"
                  ></td>

                  <td class="whitespace-nowrap px-4 py-3 text-sm">
                    <span
                      class="inline-flex rounded-full bg-slate-100 px-2.5 py-1 text-xs font-semibold text-slate-700"
                      th:text="${propostaCompra.status}"
                    >
                      Status
                    </span>
                  </td>

                  <td class="whitespace-nowrap px-4 py-3 text-right text-sm">
                    <div class="flex justify-end gap-2">
                      <div sec:authorize="hasAuthority('ROLE_IMOBILIARIA')">
                        <a
                          th:href="@{/propostas/avaliar/{id}(id=${propostaCompra.id})}"
                          class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-slate-300 bg-white text-slate-700 transition hover:bg-slate-100"
                          role="button"
                          th:title="#{link.avaliar.label}"
                          th:aria-label="#{link.avaliar.label}"
                        >
                          <ion-icon
                            name="search-outline"
                            class="text-lg"
                          ></ion-icon>
                        </a>
                      </div>

                      <div
                        th:if="${#authentication.name == propostaCompra.cliente.usuario.username and propostaCompra.status.name() == 'ABERTO'}"
                      >
                        <a
                          th:href="@{/propostas/editar/{id}(id=${propostaCompra.id})}"
                          class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-slate-300 bg-white text-slate-700 transition hover:bg-slate-100"
                          role="button"
                          th:title="#{link.editar.label}"
                          th:aria-label="#{link.editar.label}"
                        >
                          <ion-icon
                            name="create-outline"
                            class="text-lg"
                          ></ion-icon>
                        </a>

                        <form
                          th:action="@{/propostas/excluir/{id}(id=${propostaCompra.id})}"
                          method="get"
                          style="display: inline"
                        >
                          <button
                            type="submit"
                            class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-red-200 bg-red-50 text-red-700 transition hover:bg-red-100"
                            th:title="#{link.excluir.label}"
                          >
                            <ion-icon
                              name="trash-outline"
                              class="text-lg"
                            ></ion-icon>
                          </button>
                        </form>
                      </div>
                    </div>
                  </td>
                </tr>

                <tr th:if="${#lists.isEmpty(propostas)}">
                  <td
                    colspan="9"
                    class="px-4 py-10 text-center text-sm text-slate-500"
                  >
                    <span th:text="#{proposta.lista.vazia}">
                      Nenhuma proposta cadastrada.
                    </span>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div th:replace="~{fragments/modal :: modal}"></div>
      </div>
    </section>
  </body>
</html>
