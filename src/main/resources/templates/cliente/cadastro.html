<!doctype html>

<html
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  xmlns:th="http://www.thymeleaf.org"
  layout:decorate="~{layout}"
>
  <head>
    <meta charset="UTF-8" />
  </head>

  <body>
    <section layout:fragment="content">
      <div class="mx-auto w-full max-w-5xl px-4 py-8 sm:px-6 lg:px-8">
        <div
          class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between"
        >
          <div class="flex items-center gap-3">
            <div
              class="flex h-10 w-10 items-center justify-center rounded-lg bg-slate-900 text-white"
            >
              <ion-icon name="person-add-outline" class="text-xl"></ion-icon>
            </div>

            <div>
              <h1
                class="text-2xl font-bold text-slate-900"
                th:text="#{cliente.cadastrar.label}"
              >
                Cadastrar Cliente
              </h1>

              <p
                class="mt-1 text-sm text-slate-500"
                th:text="#{cliente.form.descricao}"
              >
                Preencha os dados abaixo para cadastrar ou editar um cliente.
              </p>
            </div>
          </div>

          <a
            th:href="@{/clientes/listar}"
            class="inline-flex items-center justify-center gap-2 rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 shadow-sm transition hover:bg-slate-100"
            role="button"
          >
            <ion-icon name="list-outline" class="text-lg"></ion-icon>
            <span th:text="#{cliente.listar.label}">Listar Clientes</span>
          </a>
        </div>

        <div th:replace="~{fragments/alert}"></div>

        <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
          <form
            th:action="${cliente.id == null} ? @{/clientes/salvar} : @{/clientes/editar}"
            th:object="${cliente}"
            method="POST"
            class="space-y-6"
          >
            <div class="grid gap-6 md:grid-cols-2">
              <div>
                <label
                  for="email"
                  class="mb-1 block text-sm font-medium text-slate-700"
                  th:text="#{login.email}"
                >
                  E-mail
                </label>

                <input
                  type="email"
                  id="email"
                  autofocus="autofocus"
                  th:field="*{email}"
                  th:placeholder="#{login.email.placeholder}"
                  th:classappend="${#fields.hasErrors('email')} ? ' border-red-500 focus:border-red-500 focus:ring-red-200'"
                  class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-slate-500 focus:ring-2 focus:ring-slate-200"
                />

                <p
                  class="mt-1 text-sm text-red-600"
                  th:if="${#fields.hasErrors('email')}"
                  th:errors="*{email}"
                ></p>
              </div>

              <div>
                <label
                  for="senha"
                  class="mb-1 block text-sm font-medium text-slate-700"
                  th:text="${cliente.id == null} ? #{login.password} : #{senha.nova.label}"
                >
                  Senha
                </label>

                <!-- Cadastro: senha obrigatória -->
                <input
                  th:if="${cliente.id == null}"
                  type="password"
                  id="senha"
                  th:field="*{password}"
                  th:placeholder="#{login.password.placeholder}"
                  th:classappend="${#fields.hasErrors('password')} ? ' border-red-500 focus:border-red-500 focus:ring-red-200'"
                  class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-slate-500 focus:ring-2 focus:ring-slate-200"
                />

                <!-- Edição: mantém a senha atual e permite trocá-la opcionalmente -->
                <input
                  th:if="${cliente.id != null}"
                  type="hidden"
                  th:field="*{password}"
                />
                <input
                  th:if="${cliente.id != null}"
                  type="password"
                  id="senha"
                  name="novoPassword"
                  th:placeholder="#{senha.nova.placeholder}"
                  class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-slate-500 focus:ring-2 focus:ring-slate-200"
                />

                <p
                  class="mt-1 text-sm text-red-600"
                  th:if="${#fields.hasErrors('password')}"
                  th:errors="*{password}"
                ></p>
              </div>
            </div>

            <div class="grid gap-6 md:grid-cols-2">
              <div>
                <label
                  for="cpf"
                  class="mb-1 block text-sm font-medium text-slate-700"
                >
                  CPF
                </label>

                <input
                  type="text"
                  id="cpf"
                  placeholder="___.___.___-__"
                  th:field="*{CPF}"
                  th:classappend="${#fields.hasErrors('CPF')} ? ' border-red-500 focus:border-red-500 focus:ring-red-200'"
                  data-mask="000.000.000-00"
                  data-mask-reverse="true"
                  class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-slate-500 focus:ring-2 focus:ring-slate-200"
                />

                <p
                  class="mt-1 text-sm text-red-600"
                  th:if="${#fields.hasErrors('CPF')}"
                  th:errors="*{CPF}"
                ></p>
              </div>

              <div>
                <label
                  for="nome"
                  class="mb-1 block text-sm font-medium text-slate-700"
                  th:text="#{cliente.nome.label}"
                >
                  Nome
                </label>

                <input
                  type="text"
                  id="nome"
                  th:field="*{nome}"
                  th:placeholder="#{cliente.nome.placeholder}"
                  th:classappend="${#fields.hasErrors('nome')} ? ' border-red-500 focus:border-red-500 focus:ring-red-200'"
                  class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-slate-500 focus:ring-2 focus:ring-slate-200"
                />

                <p
                  class="mt-1 text-sm text-red-600"
                  th:if="${#fields.hasErrors('nome')}"
                  th:errors="*{nome}"
                ></p>
              </div>
            </div>

            <div class="grid gap-6 md:grid-cols-3">
              <div>
                <label
                  for="telefone"
                  class="mb-1 block text-sm font-medium text-slate-700"
                  th:text="#{cliente.telefone.label}"
                >
                  Telefone
                </label>

                <input
                  type="text"
                  id="telefone"
                  placeholder="(__) _____-____"
                  th:field="*{telefone}"
                  th:classappend="${#fields.hasErrors('telefone')} ? ' border-red-500 focus:border-red-500 focus:ring-red-200'"
                  data-mask="(00) 00000-0000"
                  class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-slate-500 focus:ring-2 focus:ring-slate-200"
                />

                <p
                  class="mt-1 text-sm text-red-600"
                  th:if="${#fields.hasErrors('telefone')}"
                  th:errors="*{telefone}"
                ></p>
              </div>

              <div>
                <label
                  for="sexo"
                  class="mb-1 block text-sm font-medium text-slate-700"
                  th:text="#{cliente.sexo.label}"
                >
                  Sexo
                </label>

                <select
                  id="sexo"
                  th:field="*{sexo}"
                  th:classappend="${#fields.hasErrors('sexo')} ? ' border-red-500 focus:border-red-500 focus:ring-red-200'"
                  class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-200"
                >
                  <option value="" th:text="#{select.label}">
                    Selecione...
                  </option>
                  <option value="Masculino" th:text="#{cliente.sexo.masculino}">
                    Masculino
                  </option>
                  <option value="Feminino" th:text="#{cliente.sexo.feminino}">
                    Feminino
                  </option>
                  <option value="Outro" th:text="#{cliente.sexo.outro}">
                    Outro
                  </option>
                </select>

                <p
                  class="mt-1 text-sm text-red-600"
                  th:if="${#fields.hasErrors('sexo')}"
                  th:errors="*{sexo}"
                ></p>
              </div>

              <div>
                <label
                  for="dataNascimento"
                  class="mb-1 block text-sm font-medium text-slate-700"
                  th:text="#{cliente.dataNascimento.label}"
                >
                  Data de nascimento
                </label>

                <input
                  type="date"
                  id="dataNascimento"
                  th:field="*{dataNascimento}"
                  th:classappend="${#fields.hasErrors('dataNascimento')} ? ' border-red-500 focus:border-red-500 focus:ring-red-200'"
                  class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-200"
                />

                <p
                  class="mt-1 text-sm text-red-600"
                  th:if="${#fields.hasErrors('dataNascimento')}"
                  th:errors="*{dataNascimento}"
                ></p>
              </div>
            </div>

            <div class="flex items-center gap-2">
              <input
                type="checkbox"
                id="enabled"
                th:field="*{enabled}"
                class="h-4 w-4 cursor-pointer rounded border-slate-300 text-slate-900 focus:ring-slate-400"
              />
              <label
                for="enabled"
                class="cursor-pointer text-sm font-medium text-slate-700"
                th:text="#{usuario.enabled.label}"
                >Conta ativa</label
              >
            </div>

            <input type="hidden" id="id" th:field="*{id}" />

            <div class="flex justify-end border-t border-slate-200 pt-6">
              <button
                type="submit"
                class="cursor-pointer inline-flex items-center justify-center gap-2 rounded-lg bg-slate-900 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:ring-offset-2"
              >
                <ion-icon name="save-outline" class="text-lg"></ion-icon>
                <span th:text="#{button.salvar.label}">Salvar</span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </section>
  </body>
</html>
