<th:block th:fragment="desktop" xmlns:th="http://www.thymeleaf.org">
  <div class="relative group">
    <button type="button" class="inline-flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 hover:text-slate-900">
      <ion-icon name="business-outline" class="text-lg"></ion-icon>
      <span th:text="#{sidebar.titulo.imovel}">Imóveis</span>
      <ion-icon name="chevron-down-outline" class="text-base"></ion-icon>
    </button>

    <div class="invisible absolute left-0 top-full w-48 rounded-xl border border-slate-200 bg-white p-2 opacity-0 shadow-lg transition group-hover:visible group-hover:opacity-100">
      <a class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm text-slate-700 hover:bg-slate-100" th:href="@{/imoveis/cadastrar}">
        <ion-icon name="add-outline" class="text-lg"></ion-icon>
        <span th:text="#{sidebar.link.cadastrar}">Cadastrar</span>
      </a>

      <a class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm text-slate-700 hover:bg-slate-100" th:href="@{/imoveis/meus}">
        <ion-icon name="list-outline" class="text-lg"></ion-icon>
        <span th:text="#{imovel.meus.label}">Meus imóveis</span>
      </a>
    </div>
  </div>

  <a class="inline-flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 hover:text-slate-900" th:href="@{/propostas/imobiliaria}">
    <ion-icon name="document-text-outline" class="text-lg"></ion-icon>
    <span th:text="#{sidebar.titulo.proposta}">Propostas</span>
  </a>
</th:block>
