<th:block th:fragment="desktop" xmlns:th="http://www.thymeleaf.org">
  <div class="relative group">
    <button
      type="button"
      class="inline-flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 hover:text-slate-900"
    >
      <ion-icon name="storefront-outline" class="text-lg"></ion-icon>
      <span th:text="#{sidebar.titulo.imobiliaria}">Imobiliárias</span>
      <ion-icon name="chevron-down-outline" class="text-base"></ion-icon>
    </button>

    <div class="invisible absolute left-0 top-full w-48 rounded-xl border border-slate-200 bg-white p-2 opacity-0 shadow-lg transition group-hover:visible group-hover:opacity-100">
      <a class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm text-slate-700 hover:bg-slate-100" th:href="@{/imobiliarias/cadastrar}">
        <ion-icon name="add-outline" class="text-lg"></ion-icon>
        <span th:text="#{sidebar.link.cadastrar}">Cadastrar</span>
      </a>

      <a class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm text-slate-700 hover:bg-slate-100" th:href="@{/imobiliarias/listar}">
        <ion-icon name="list-outline" class="text-lg"></ion-icon>
        <span th:text="#{sidebar.link.listar}">Listar</span>
      </a>
    </div>
  </div>

  <div class="relative group">
    <button
      type="button"
      class="inline-flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 hover:text-slate-900"
    >
      <ion-icon name="people-outline" class="text-lg"></ion-icon>
      <span th:text="#{sidebar.titulo.cliente}">Clientes</span>
      <ion-icon name="chevron-down-outline" class="text-base"></ion-icon>
    </button>

    <div class="invisible absolute left-0 top-full w-48 rounded-xl border border-slate-200 bg-white p-2 opacity-0 shadow-lg transition group-hover:visible group-hover:opacity-100">
      <a class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm text-slate-700 hover:bg-slate-100" th:href="@{/clientes/cadastrar}">
        <ion-icon name="add-outline" class="text-lg"></ion-icon>
        <span th:text="#{sidebar.link.cadastrar}">Cadastrar</span>
      </a>

      <a class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm text-slate-700 hover:bg-slate-100" th:href="@{/clientes/listar}">
        <ion-icon name="list-outline" class="text-lg"></ion-icon>
        <span th:text="#{sidebar.link.listar}">Listar</span>
      </a>
    </div>
  </div>
</th:block>
