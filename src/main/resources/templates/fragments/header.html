<header
  th:fragment="header"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity"
  class="sticky top-0 z-40 border-b border-slate-200 bg-white"
>
  <nav
    class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8"
  >
    <a
      th:href="@{/}"
      class="flex items-center gap-2 text-lg font-bold text-slate-900"
    >
      <span th:text="#{title.label}">Imobiliária</span>
    </a>

    <button
      id="mobile-menu-button"
      type="button"
      class="inline-flex items-center justify-center rounded-lg p-2 text-slate-600 hover:bg-slate-100 hover:text-slate-900 md:hidden"
      aria-label="Abrir menu"
    >
      <ion-icon name="menu-outline" class="text-3xl"></ion-icon>
    </button>

    <div class="hidden items-center gap-2 md:flex">
      <a
        class="inline-flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 hover:text-slate-900"
        th:href="@{/}"
      >
        <ion-icon name="home-outline" class="text-lg"></ion-icon>
        <span th:text="#{sidebar.link.home}">Início</span>
      </a>

      <div class="relative group">
        <button
          type="button"
          class="inline-flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 hover:text-slate-900"
        >
          <ion-icon name="business-outline" class="text-lg"></ion-icon>
          <span th:text="#{sidebar.titulo.imovel}">Imóveis</span>
          <ion-icon name="chevron-down-outline" class="text-base"></ion-icon>
        </button>

        <div
          class="invisible absolute left-0 top-full w-48 rounded-xl border border-slate-200 bg-white p-2 opacity-0 shadow-lg transition group-hover:visible group-hover:opacity-100"
        >
          <a
            class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm text-slate-700 hover:bg-slate-100"
            th:href="@{/imoveis/cadastrar}"
          >
            <ion-icon name="add-outline" class="text-lg"></ion-icon>
            <span th:text="#{sidebar.link.cadastrar}">Cadastrar</span>
          </a>

          <a
            class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm text-slate-700 hover:bg-slate-100"
            th:href="@{/imoveis/listar}"
          >
            <ion-icon name="list-outline" class="text-lg"></ion-icon>
            <span th:text="#{sidebar.link.listar}">Listar</span>
          </a>

          <a
            sec:authorize="hasAuthority('ROLE_IMOBILIARIA')"
            class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm text-slate-700 hover:bg-slate-100"
            th:href="@{/imoveis/meus}"
          >
            <ion-icon name="list-outline" class="text-lg"></ion-icon>
            <span>Meus Imóveis</span>
          </a>
        </div>
      </div>

      <div class="relative group">
        <button
          type="button"
          class="inline-flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 hover:text-slate-900"
        >
          <ion-icon name="storefront-outline" class="text-lg"></ion-icon>
          <span th:text="#{sidebar.titulo.imobiliaria}">Imobiliárias</span>
          <ion-icon name="chevron-down-outline" class="text-base"></ion-icon>
        </button>

        <div
          class="invisible absolute left-0 top-full w-48 rounded-xl border border-slate-200 bg-white p-2 opacity-0 shadow-lg transition group-hover:visible group-hover:opacity-100"
        >
          <a
            class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm text-slate-700 hover:bg-slate-100"
            th:href="@{/imobiliarias/cadastrar}"
          >
            <ion-icon name="add-outline" class="text-lg"></ion-icon>
            <span th:text="#{sidebar.link.cadastrar}">Cadastrar</span>
          </a>

          <a
            class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm text-slate-700 hover:bg-slate-100"
            th:href="@{/imobiliarias/listar}"
          >
            <ion-icon name="list-outline" class="text-lg"></ion-icon>
            <span th:text="#{sidebar.link.listar}">Listar</span>
          </a>
        </div>
      </div>

      <div class="relative group">
        <button
          type="button"
          class="inline-flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 hover:text-slate-900"
        >
          <ion-icon name="people-outline" class="text-lg"></ion-icon>
          <span th:text="#{sidebar.titulo.cliente}">Clientes</span>
          <ion-icon name="chevron-down-outline" class="text-base"></ion-icon>
        </button>

        <div
          class="invisible absolute left-0 top-full w-48 rounded-xl border border-slate-200 bg-white p-2 opacity-0 shadow-lg transition group-hover:visible group-hover:opacity-100"
        >
          <a
            class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm text-slate-700 hover:bg-slate-100"
            th:href="@{/clientes/cadastrar}"
          >
            <ion-icon name="add-outline" class="text-lg"></ion-icon>
            <span th:text="#{sidebar.link.cadastrar}">Cadastrar</span>
          </a>

          <a
            class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm text-slate-700 hover:bg-slate-100"
            th:href="@{/clientes/listar}"
          >
            <ion-icon name="list-outline" class="text-lg"></ion-icon>
            <span th:text="#{sidebar.link.listar}">Listar</span>
          </a>
        </div>
      </div>

      <div class="relative group">
        <button
          type="button"
          class="inline-flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 hover:text-slate-900"
        >
          <ion-icon name="document-text-outline" class="text-lg"></ion-icon>
          <span th:text="#{sidebar.titulo.proposta}">Propostas</span>
          <ion-icon name="chevron-down-outline" class="text-base"></ion-icon>
        </button>

        <div
          class="invisible absolute left-0 top-full w-48 rounded-xl border border-slate-200 bg-white p-2 opacity-0 shadow-lg transition group-hover:visible group-hover:opacity-100"
        >
          <a
            class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm text-slate-700 hover:bg-slate-100"
            th:href="@{/propostas/cadastrar}"
          >
            <ion-icon name="add-outline" class="text-lg"></ion-icon>
            <span th:text="#{sidebar.link.cadastrar}">Cadastrar</span>
          </a>

          <a
            class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm text-slate-700 hover:bg-slate-100"
            th:href="@{/propostas/listar}"
          >
            <ion-icon name="list-outline" class="text-lg"></ion-icon>
            <span th:text="#{sidebar.link.listar}">Listar</span>
          </a>
        </div>
      </div>
    </div>

    <div class="hidden items-center gap-3 md:flex">
      <a th:href="@{/(lang='pt')}" class="rounded hover:opacity-80">
        <span class="fi fi-br"></span>
      </a>

      <a th:href="@{/(lang='en')}" class="rounded hover:opacity-80">
        <span class="fi fi-us" title="EN"></span>
      </a>

      <a
        sec:authorize="!isAuthenticated()"
        class="inline-flex items-center gap-2 rounded-lg border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100"
        th:href="@{/login}"
      >
        <ion-icon name="log-in-outline" class="text-lg"></ion-icon>
        Entrar
      </a>

      <form
        sec:authorize="isAuthenticated()"
        th:action="@{/logout}"
        method="post"
      >
        <button
          class="cursor-pointer inline-flex items-center gap-2 rounded-lg border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100"
          type="submit"
        >
          <ion-icon name="log-out-outline" class="text-lg"></ion-icon>
          <span th:text="#{header.sair}"> Sair</span>
        </button>
      </form>
    </div>
  </nav>

  <div
    id="mobile-menu"
    class="hidden border-t border-slate-200 bg-white px-4 py-3 md:hidden"
  >
    <div class="flex flex-col gap-1">
      <a
        class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100"
        th:href="@{/}"
      >
        <ion-icon name="home-outline" class="text-lg"></ion-icon>
        <span th:text="#{sidebar.link.home}">Início</span>
      </a>

      <a
        class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100"
        th:href="@{/imoveis/cadastrar}"
      >
        <ion-icon name="business-outline" class="text-lg"></ion-icon>
        <span th:text="#{sidebar.titulo.imovel}">Imóveis</span>
        <span>-</span>
        <span th:text="#{sidebar.link.cadastrar}">Cadastrar</span>
      </a>

      <a
        class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100"
        th:href="@{/imoveis/listar}"
      >
        <ion-icon name="business-outline" class="text-lg"></ion-icon>
        <span th:text="#{sidebar.titulo.imovel}">Imóveis</span>
        <span>-</span>
        <span th:text="#{sidebar.link.listar}">Listar</span>
      </a>

      <a
        class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100"
        th:href="@{/imobiliarias/cadastrar}"
      >
        <ion-icon name="storefront-outline" class="text-lg"></ion-icon>
        <span th:text="#{sidebar.titulo.imobiliaria}">Imobiliárias</span>
        <span>-</span>
        <span th:text="#{sidebar.link.cadastrar}">Cadastrar</span>
      </a>

      <a
        class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100"
        th:href="@{/imobiliarias/listar}"
      >
        <ion-icon name="storefront-outline" class="text-lg"></ion-icon>
        <span th:text="#{sidebar.titulo.imobiliaria}">Imobiliárias</span>
        <span>-</span>
        <span th:text="#{sidebar.link.listar}">Listar</span>
      </a>

      <a
        class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100"
        th:href="@{/clientes/cadastrar}"
      >
        <ion-icon name="people-outline" class="text-lg"></ion-icon>
        <span th:text="#{sidebar.titulo.cliente}">Clientes</span>
        <span>-</span>
        <span th:text="#{sidebar.link.cadastrar}">Cadastrar</span>
      </a>

      <a
        class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100"
        th:href="@{/clientes/listar}"
      >
        <ion-icon name="people-outline" class="text-lg"></ion-icon>
        <span th:text="#{sidebar.titulo.cliente}">Clientes</span>
        <span>-</span>
        <span th:text="#{sidebar.link.listar}">Listar</span>
      </a>

      <a
        class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100"
        th:href="@{/propostas/cadastrar}"
      >
        <ion-icon name="document-text-outline" class="text-lg"></ion-icon>
        <span th:text="#{sidebar.titulo.proposta}">Propostas</span>
        <span>-</span>
        <span th:text="#{sidebar.link.cadastrar}">Cadastrar</span>
      </a>

      <a
        class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100"
        th:href="@{/propostas/listar}"
      >
        <ion-icon name="document-text-outline" class="text-lg"></ion-icon>
        <span th:text="#{sidebar.titulo.proposta}">Propostas</span>
        <span>-</span>
        <span th:text="#{sidebar.link.listar}">Listar</span>
      </a>

      <div class="mt-3 flex items-center gap-3 px-3">
        <a th:href="@{/(lang='pt')}" class="rounded hover:opacity-80">
          <span class="fi fi-br"></span>
        </a>

        <a th:href="@{/(lang='en')}" class="rounded hover:opacity-80">
          <span class="fi fi-us" title="EN"></span>
        </a>
      </div>

      <a
        sec:authorize="!isAuthenticated()"
        class="mt-2 flex items-center justify-center gap-2 rounded-lg border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100"
        th:href="@{/login}"
      >
        <ion-icon name="log-in-outline" class="text-lg"></ion-icon>
        Entrar
      </a>

      <form
        sec:authorize="isAuthenticated()"
        th:action="@{/logout}"
        method="post"
        class="mt-2"
      >
        <button
          class="flex w-full items-center justify-center gap-2 rounded-lg border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100"
          type="submit"
        >
          <ion-icon name="log-out-outline" class="text-lg"></ion-icon>
          <span th:text="#{header.sair}"> Sair</span>
        </button>
      </form>
    </div>
  </div>
</header>
