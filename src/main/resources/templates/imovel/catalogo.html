<!doctype html>
<html
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity"
  layout:decorate="~{layout}"
>
  <head>
    <meta charset="UTF-8" />
    <style>
      /* ── Google Fonts ─────────────────────────────────────── */
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap');

      /* ── CSS Vars ─────────────────────────────────────────── */
      :root {
        --cream:   #f8f5f0;
        --sand:    #e8e0d4;
        --clay:    #c9b99a;
        --brown:   #5c4033;
        --ink:     #1a1410;
        --accent:  #b07d4f;
        --success: #3d7a56;
        --card-r:  16px;
      }

      /* ── Base ─────────────────────────────────────────────── */
      .cat-page {
        background: var(--cream);
        font-family: 'DM Sans', sans-serif;
        min-height: 100vh;
      }

      /* ── Hero band ────────────────────────────────────────── */
      .cat-hero {
        background: var(--ink);
        padding: 56px 0 44px;
        position: relative;
        overflow: hidden;
      }
      .cat-hero::before {
        content: '';
        position: absolute;
        inset: 0;
        background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      }
      .cat-hero-inner {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 24px;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 24px;
        position: relative;
        z-index: 1;
      }
      .cat-hero-label {
        font-family: 'DM Sans', sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--clay);
        margin-bottom: 12px;
      }
      .cat-hero-title {
        font-family: 'Playfair Display', serif;
        font-size: clamp(30px, 4vw, 48px);
        font-weight: 700;
        color: #fff;
        line-height: 1.15;
        max-width: 560px;
      }
      .cat-hero-title em {
        font-style: italic;
        color: var(--clay);
      }
      .cat-count {
        font-size: 13px;
        color: rgba(255,255,255,.5);
        margin-top: 10px;
      }

      /* ── Filter bar ───────────────────────────────────────── */
      .cat-filter-wrap {
        background: #fff;
        border-bottom: 1px solid var(--sand);
        position: sticky;
        top: 0;
        z-index: 50;
        box-shadow: 0 1px 8px rgba(0,0,0,.06);
      }
      .cat-filter {
        max-width: 1200px;
        margin: 0 auto;
        padding: 14px 24px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .cat-filter-label {
        font-size: 12px;
        font-weight: 500;
        color: var(--brown);
        letter-spacing: .5px;
        white-space: nowrap;
      }
      .cat-search {
        flex: 1;
        min-width: 200px;
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--cream);
        border: 1.5px solid var(--sand);
        border-radius: 10px;
        padding: 9px 14px;
        transition: border-color .2s;
      }
      .cat-search:focus-within {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(176,125,79,.12);
      }
      .cat-search ion-icon {
        color: var(--clay);
        font-size: 16px;
        flex-shrink: 0;
      }
      .cat-search input {
        border: none;
        background: transparent;
        outline: none;
        font-size: 13.5px;
        color: var(--ink);
        width: 100%;
        font-family: 'DM Sans', sans-serif;
      }
      .cat-search input::placeholder { color: var(--clay); }
      .cat-btn-filter {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--ink);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 10px 20px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        font-family: 'DM Sans', sans-serif;
        transition: background .2s;
        white-space: nowrap;
      }
      .cat-btn-filter:hover { background: var(--brown); }
      .cat-btn-clear {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: transparent;
        color: var(--brown);
        border: 1.5px solid var(--sand);
        border-radius: 10px;
        padding: 9px 16px;
        font-size: 13px;
        font-weight: 500;
        text-decoration: none;
        font-family: 'DM Sans', sans-serif;
        transition: background .2s, border-color .2s;
        white-space: nowrap;
      }
      .cat-btn-clear:hover { background: var(--sand); border-color: var(--clay); }

      /* ── Active filter chip ────────────────────────────────── */
      .filter-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--accent);
        color: #fff;
        border-radius: 999px;
        padding: 4px 12px 4px 10px;
        font-size: 12px;
        font-weight: 500;
      }

      /* ── Grid ─────────────────────────────────────────────── */
      .cat-body {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 24px 80px;
      }

      .cat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
        gap: 28px;
      }

      /* ── Card ─────────────────────────────────────────────── */
      .prop-card {
        background: #fff;
        border-radius: var(--card-r);
        overflow: hidden;
        box-shadow: 0 2px 12px rgba(0,0,0,.07);
        transition: transform .25s, box-shadow .25s;
        display: flex;
        flex-direction: column;
      }
      .prop-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 32px rgba(0,0,0,.13);
      }

      /* Photo area */
      .prop-photo {
        position: relative;
        height: 220px;
        overflow: hidden;
        background: var(--sand);
      }
      .prop-photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform .4s ease;
      }
      .prop-card:hover .prop-photo img { transform: scale(1.05); }

      .prop-no-photo {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: var(--clay);
        font-size: 13px;
      }
      .prop-no-photo ion-icon { font-size: 40px; opacity: .4; }

      /* Price badge */
      .prop-price-badge {
        position: absolute;
        bottom: 14px;
        left: 14px;
        background: rgba(26,20,16,.82);
        backdrop-filter: blur(6px);
        color: #fff;
        font-family: 'Playfair Display', serif;
        font-size: 18px;
        font-weight: 700;
        padding: 8px 16px;
        border-radius: 10px;
        letter-spacing: -.3px;
      }

      /* Photo count chip */
      .prop-photo-count {
        position: absolute;
        top: 12px;
        right: 12px;
        background: rgba(26,20,16,.65);
        color: #fff;
        font-size: 11px;
        font-weight: 500;
        padding: 3px 10px;
        border-radius: 999px;
        display: flex;
        align-items: center;
        gap: 4px;
        backdrop-filter: blur(4px);
      }

      /* Thumbnail strip */
      .prop-thumbs {
        display: flex;
        gap: 4px;
        padding: 6px 8px;
        background: var(--ink);
        overflow-x: auto;
        scrollbar-width: none;
      }
      .prop-thumbs::-webkit-scrollbar { display: none; }
      .prop-thumb {
        flex-shrink: 0;
        width: 50px;
        height: 36px;
        border-radius: 5px;
        overflow: hidden;
        cursor: pointer;
        opacity: .65;
        transition: opacity .2s, outline .2s;
        outline: 2px solid transparent;
      }
      .prop-thumb.active { opacity: 1; outline-color: var(--accent); }
      .prop-thumb img { width: 100%; height: 100%; object-fit: cover; }

      /* Body */
      .prop-body {
        padding: 20px 22px;
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .prop-imob {
        font-size: 10.5px;
        font-weight: 500;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--accent);
      }

      .prop-address {
        font-family: 'Playfair Display', serif;
        font-size: 18px;
        font-weight: 500;
        color: var(--ink);
        line-height: 1.3;
      }

      .prop-meta {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12.5px;
        color: var(--brown);
      }
      .prop-meta ion-icon { font-size: 14px; color: var(--clay); }

      .prop-desc {
        font-size: 13.5px;
        color: #6b5e52;
        line-height: 1.6;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
        flex: 1;
      }

      .prop-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 22px 18px;
        border-top: 1px solid var(--sand);
        gap: 10px;
      }

      .prop-city-chip {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        background: var(--cream);
        border: 1px solid var(--sand);
        border-radius: 999px;
        padding: 4px 12px;
        font-size: 12px;
        color: var(--brown);
        font-weight: 500;
      }
      .prop-city-chip ion-icon { font-size: 13px; color: var(--clay); }

      .prop-btn-proposta {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--success);
        color: #fff;
        border-radius: 10px;
        padding: 9px 18px;
        font-size: 13px;
        font-weight: 500;
        text-decoration: none;
        font-family: 'DM Sans', sans-serif;
        transition: background .2s;
      }
      .prop-btn-proposta:hover { background: #2f5e40; }

      /* ── Empty state ──────────────────────────────────────── */
      .cat-empty {
        grid-column: 1/-1;
        text-align: center;
        padding: 80px 20px;
        color: var(--clay);
      }
      .cat-empty ion-icon { font-size: 56px; opacity: .4; display: block; margin: 0 auto 16px; }
      .cat-empty p { font-size: 16px; }

      /* ── Section divider ──────────────────────────────────── */
      .cat-section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 28px;
      }
      .cat-section-title {
        font-family: 'Playfair Display', serif;
        font-size: 22px;
        font-weight: 700;
        color: var(--ink);
      }
      .cat-section-sub {
        font-size: 13px;
        color: var(--clay);
        margin-top: 2px;
      }
    </style>
  </head>

  <body>
    <section layout:fragment="content">
      <div class="cat-page">

        <!-- ── Hero ─────────────────────────────────────────── -->
        <div class="cat-hero">
          <div class="cat-hero-inner">
            <div>
              <p class="cat-hero-label" th:text="#{imovel.catalogo.hero.label}">Catálogo de imóveis</p>
              <h1 class="cat-hero-title">
                Encontre o imóvel <em>certo</em> para você
              </h1>
              <p class="cat-count">
                <span th:text="${#lists.size(imoveis)}">0</span>
                <span th:text="#{imovel.catalogo.disponiveis}"> imóveis disponíveis</span>
                <th:block th:if="${cidade != null and not #strings.isEmpty(cidade)}">
                  &nbsp;·&nbsp; Cidade: <strong th:text="${cidade}" style="color:var(--clay)"></strong>
                </th:block>
              </p>
            </div>
          </div>
        </div>

        <!-- ── Filter bar ───────────────────────────────────── -->
        <div class="cat-filter-wrap">
          <form th:action="@{/imoveis/catalogo}" method="GET" class="cat-filter">
            <span class="cat-filter-label" th:text="#{imovel.filtro.cidade.label}">Buscar por cidade</span>

            <div class="cat-search">
              <ion-icon name="search-outline"></ion-icon>
              <input type="text" name="cidade"
                     th:value="${cidade}"
                     th:placeholder="#{imovel.filtro.cidade.placeholder}"
                     autocomplete="off" />
            </div>

            <button type="submit" class="cat-btn-filter">
              <ion-icon name="filter-outline"></ion-icon>
              <span th:text="#{button.filtrar.label}">Filtrar</span>
            </button>

            <a th:if="${cidade != null and not #strings.isEmpty(cidade)}"
               th:href="@{/imoveis/catalogo}"
               class="cat-btn-clear">
              <ion-icon name="close-outline"></ion-icon>
              <span th:text="#{button.limpar.label}">Limpar</span>
            </a>
          </form>
        </div>

        <!-- ── Cards ────────────────────────────────────────── -->
        <div class="cat-body">
          <div class="cat-section-header">
            <div>
              <h2 class="cat-section-title" th:text="#{imovel.catalogo.section.title}">Imóveis à venda</h2>
              <p class="cat-section-sub">
                <span th:text="${#lists.size(imoveis)}">0</span>
                <span th:text="#{imovel.catalogo.resultados}"> resultado(s) encontrado(s)</span>
              </p>
            </div>

            <!-- Active filter chip -->
            <th:block th:if="${cidade != null and not #strings.isEmpty(cidade)}">
              <span class="filter-chip">
                <ion-icon name="location-outline"></ion-icon>
                <span th:text="${cidade}"></span>
              </span>
            </th:block>
          </div>

          <div class="cat-grid">

            <!-- Empty state -->
            <div class="cat-empty" th:if="${#lists.isEmpty(imoveis)}">
              <ion-icon name="home-outline"></ion-icon>
              <p th:text="#{busca.vazia}">Nenhum imóvel encontrado.</p>
            </div>

            <!-- Property cards -->
            <div class="prop-card" th:each="imovel : ${imoveis}">

              <!-- Photo area -->
              <div class="prop-photo"
                   th:id="'photo-' + ${imovel.id}">

                <!-- Has photos -->
                <th:block th:if="${not #lists.isEmpty(imovel.fotos)}">
                  <img th:src="@{/uploads/{n}(n=${imovel.fotos[0].nomeArquivo})}"
                       th:alt="${imovel.endereco}"
                       th:id="'main-img-' + ${imovel.id}" />

                  <!-- Count chip (only when > 1) -->
                  <span class="prop-photo-count"
                        th:if="${#lists.size(imovel.fotos) > 1}">
                    <ion-icon name="images-outline"></ion-icon>
                    <span th:text="${#lists.size(imovel.fotos)}"></span>
                  </span>
                </th:block>

                <!-- No photos -->
                <div class="prop-no-photo" th:if="${#lists.isEmpty(imovel.fotos)}">
                  <ion-icon name="image-outline"></ion-icon>
                  <span th:text="#{imovel.catalogo.semFoto}">Sem foto disponível</span>
                </div>

                <!-- Price badge -->
                <div class="prop-price-badge"
                     th:text="${#numbers.formatCurrency(imovel.valor)}">
                </div>
              </div>

              <!-- Thumbnail strip (only when > 1 foto) -->
              <div class="prop-thumbs"
                   th:if="${#lists.size(imovel.fotos) > 1}"
                   th:id="'thumbs-' + ${imovel.id}">
                <div class="prop-thumb active"
                     th:each="foto, iterStat : ${imovel.fotos}"
                     th:classappend="${iterStat.index == 0} ? ' active' : ''"
                     th:onclick="'switchPhoto(' + ${imovel.id} + ',' + ${iterStat.index} + ',\'' + @{/uploads/{n}(n=${foto.nomeArquivo})} + '\')'">
                  <img th:src="@{/uploads/{n}(n=${foto.nomeArquivo})}"
                       th:alt="'Foto ' + ${iterStat.count}" />
                </div>
              </div>

              <!-- Body -->
              <div class="prop-body">
                <span class="prop-imob" th:text="${imovel.imobiliaria.nome}"></span>
                <h3 class="prop-address" th:text="${imovel.endereco}"></h3>
                <div class="prop-desc" th:text="${imovel.descricao}"></div>
              </div>

              <!-- Footer -->
              <div class="prop-footer">
                <span class="prop-city-chip">
                  <ion-icon name="location-outline"></ion-icon>
                  <span th:text="${imovel.cidade.nome}"></span>
                </span>

                <!-- Proposta button: só para clientes logados -->
                <a sec:authorize="hasAuthority('ROLE_CLIENTE')"
                   th:href="@{/propostas/cadastrar(imovelId=${imovel.id})}"
                   class="prop-btn-proposta">
                  <ion-icon name="document-text-outline"></ion-icon>
                  <span th:text="#{proposta.nova.label}">Fazer proposta</span>
                </a>

                <!-- Login hint for anonymous users -->
                <a sec:authorize="isAnonymous()"
                   th:href="@{/login}"
                   class="prop-btn-proposta" style="background: var(--accent);">
                  <ion-icon name="log-in-outline"></ion-icon>
                  <span th:text="#{imovel.catalogo.login.proposta}">Entrar para propor</span>
                </a>
              </div>
            </div>

          </div><!-- /cat-grid -->
        </div><!-- /cat-body -->
      </div><!-- /cat-page -->

      <script>
        function switchPhoto(imovelId, index, src) {
          // Update main image
          document.getElementById('main-img-' + imovelId).src = src;
          // Update active thumb
          var thumbs = document.getElementById('thumbs-' + imovelId)
                               .querySelectorAll('.prop-thumb');
          thumbs.forEach(function(t, i) {
            t.classList.toggle('active', i === index);
          });
        }
      </script>
    </section>
  </body>
</html>
