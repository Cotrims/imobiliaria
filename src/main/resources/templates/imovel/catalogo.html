<!doctype html>
<html
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity"
  layout:decorate="~{layout}"
>
  <head>
    <meta charset="UTF-8" />
  </head>

  <body>
    <section layout:fragment="content">
      <div class="mx-auto w-full max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
        <div
          class="mb-8 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm"
        >
          <div
            class="flex flex-col gap-6 lg:flex-row lg:items-end lg:justify-between"
          >
            <div class="max-w-2xl">
              <div
                class="mb-4 flex h-12 w-12 items-center justify-center rounded-xl bg-slate-900 text-white"
              >
                <ion-icon name="home-outline" class="text-2xl"></ion-icon>
              </div>

              <h1
                class="text-3xl font-bold tracking-tight text-slate-900 sm:text-4xl"
                th:text="#{imovel.catalogo.section.title}"
              >
                Imóveis à venda
              </h1>

              <p class="mt-3 text-base leading-7 text-slate-600">
                <span th:text="${#lists.size(imoveis)}">0</span>
                <span th:text="#{imovel.catalogo.resultados}">
                  resultado(s) encontrado(s)</span
                >
                <th:block
                  th:if="${cidade != null and not #strings.isEmpty(cidade)}"
                >
                  <span> para </span>
                  <strong th:text="${cidade}">São Carlos</strong>
                </th:block>
              </p>
            </div>

            <form
              th:action="@{/imoveis/catalogo}"
              method="GET"
              class="flex w-full flex-col gap-3 sm:flex-row lg:max-w-xl"
            >
              <div class="relative flex-1">
                <span
                  class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400"
                >
                  <ion-icon name="search-outline" class="text-lg"></ion-icon>
                </span>

                <input
                  type="text"
                  name="cidade"
                  th:value="${cidade}"
                  th:placeholder="#{imovel.filtro.cidade.placeholder}"
                  autocomplete="off"
                  class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 pl-10 text-sm text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-slate-500 focus:ring-2 focus:ring-slate-200"
                />
              </div>

              <button
                type="submit"
                class="inline-flex items-center justify-center gap-2 rounded-lg bg-slate-900 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-800"
              >
                <ion-icon name="filter-outline" class="text-lg"></ion-icon>
                <span th:text="#{button.filtrar.label}">Filtrar</span>
              </button>

              <a
                th:if="${cidade != null and not #strings.isEmpty(cidade)}"
                th:href="@{/imoveis/catalogo}"
                class="inline-flex items-center justify-center gap-2 rounded-lg border border-slate-300 bg-white px-5 py-2.5 text-sm font-semibold text-slate-700 shadow-sm transition hover:bg-slate-100"
              >
                <ion-icon name="close-outline" class="text-lg"></ion-icon>
                <span th:text="#{button.limpar.label}">Limpar</span>
              </a>
            </form>
          </div>
        </div>

        <div th:replace="~{fragments/alert}"></div>

        <div
          th:if="${#lists.isEmpty(imoveis)}"
          class="rounded-2xl border border-dashed border-slate-300 bg-white p-12 text-center shadow-sm"
        >
          <div
            class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-full bg-slate-100 text-slate-500"
          >
            <ion-icon name="home-outline" class="text-3xl"></ion-icon>
          </div>
          <p
            class="text-base font-medium text-slate-700"
            th:text="#{busca.vazia}"
          >
            Nenhum imóvel encontrado.
          </p>
        </div>

        <div
          class="grid gap-6 md:grid-cols-2 xl:grid-cols-3"
          th:if="${not #lists.isEmpty(imoveis)}"
        >
          <article
            th:each="imovel : ${imoveis}"
            class="rounded-2xl border border-slate-200 bg-white shadow-sm transition hover:-translate-y-1 hover:shadow-md"
          >
            <div
              class="relative aspect-[4/3] w-full overflow-hidden rounded-t-2xl bg-slate-100"
              data-carousel
            >
              <div
                th:if="${not #lists.isEmpty(imovel.fotos)}"
                class="absolute inset-0 h-full w-full overflow-hidden"
              >
                <div
                  th:each="foto, stat : ${imovel.fotos}"
                  class="carousel-slide absolute inset-0 h-full w-full"
                  th:classappend="${stat.index != 0} ? 'hidden' : ''"
                >
                  <img
                    th:src="@{/uploads/{n}(n=${foto.nomeArquivo})}"
                    th:alt="${imovel.endereco}"
                    class="h-full w-full object-cover"
                  />
                </div>
              </div>

              <div
                th:if="${#lists.size(imovel.fotos) > 1}"
                class="absolute inset-0 z-20 flex items-center justify-between px-3"
              >
                <button
                  type="button"
                  data-carousel-prev
                  class="cursor-pointer flex h-9 w-9 items-center justify-center rounded-full bg-black/50 text-white transition hover:bg-black/70"
                >
                  <ion-icon
                    name="chevron-back-circle-outline"
                    class="text-2xl"
                  ></ion-icon>
                </button>

                <button
                  type="button"
                  data-carousel-next
                  class="cursou-pointer flex h-9 w-9 items-center justify-center rounded-full bg-black/50 text-white transition hover:bg-black/70"
                >
                  <ion-icon
                    name="chevron-forward-circle-outline"
                    class="text-2xl"
                  ></ion-icon>
                </button>
              </div>

              <div
                th:if="${#lists.isEmpty(imovel.fotos)}"
                class="absolute inset-0 flex flex-col items-center justify-center gap-2 text-slate-400"
              >
                <ion-icon name="image-outline" class="text-5xl"></ion-icon>
                <span class="text-sm" th:text="#{imovel.catalogo.semFoto}"
                  >Sem foto disponível</span
                >
              </div>

              <div
                class="absolute bottom-3 left-3 rounded-lg bg-slate-900/90 px-3 py-2 text-sm font-bold text-white shadow-sm"
                th:text="${#numbers.formatCurrency(imovel.valor)}"
              >
                R$ 0,00
              </div>

              <div
                th:if="${#lists.size(imovel.fotos) > 1}"
                class="absolute right-3 top-3 inline-flex items-center gap-1 rounded-full bg-slate-900/80 px-2.5 py-1 text-xs font-medium text-white"
              >
                <ion-icon name="images-outline"></ion-icon>
                <span th:text="${#lists.size(imovel.fotos)}">2</span>
              </div>
            </div>

            <div class="p-5">
              <div class="mb-3 flex items-center justify-between gap-3">
                <span
                  class="inline-flex items-center gap-1 rounded-full bg-slate-100 px-3 py-1 text-xs font-medium text-slate-700"
                >
                  <ion-icon name="location-outline"></ion-icon>
                  <span th:text="${imovel.cidade.nome}">Cidade</span>
                </span>
              </div>

              <p
                class="text-xs font-semibold uppercase tracking-wide text-slate-500"
                th:text="${imovel.imobiliaria.nome}"
              >
                Imobiliária
              </p>
              <h2
                class="mt-1 text-lg font-bold text-slate-900"
                th:text="${imovel.endereco}"
              >
                Endereço
              </h2>
              <p
                class="mt-3 line-clamp-3 text-sm leading-6 text-slate-600"
                th:text="${imovel.descricao}"
              >
                Descrição
              </p>
            </div>

            <div
              class="flex items-center justify-end gap-3 border-t border-slate-100 px-5 py-4"
            >
              <a
                sec:authorize="hasRole('CLIENTE')"
                th:href="@{/propostas/cadastrar(imovelId=${imovel.id})}"
                class="inline-flex items-center justify-center gap-2 rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-800"
              >
                <ion-icon
                  name="document-text-outline"
                  class="text-lg"
                ></ion-icon>
                <span th:text="#{proposta.nova.label}">Fazer proposta</span>
              </a>

              <a
                sec:authorize="isAnonymous()"
                th:href="@{/login}"
                class="inline-flex items-center justify-center gap-2 rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 shadow-sm transition hover:bg-slate-100"
              >
                <ion-icon name="log-in-outline" class="text-lg"></ion-icon>
                <span th:text="#{imovel.catalogo.login.proposta}"
                  >Entrar para propor</span
                >
              </a>
            </div>
          </article>
        </div>
      </div>
    </section>
  </body>
</html>
