<!doctype html>
<html
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  xmlns:th="http://www.thymeleaf.org"
  layout:decorate="~{layout}"
>
  <head>
    <meta charset="UTF-8" />
  </head>

  <body>
    <section layout:fragment="content">
      <div class="mx-auto w-full max-w-5xl px-4 py-8 sm:px-6 lg:px-8">
        <div
          class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between"
        >
          <div class="flex items-center gap-3">
            <div
              class="flex h-10 w-10 items-center justify-center rounded-lg bg-slate-900 text-white"
            >
              <ion-icon name="person-add-outline" class="text-xl"></ion-icon>
            </div>

            <div>
              <h1
                class="text-2xl font-bold text-slate-900"
                th:text="#{usuario.cadastrar.label}"
              >
                Cadastrar Usuário
              </h1>

              <p
                class="mt-1 text-sm text-slate-500"
                th:text="#{usuario.form.description}"
              >
                Preencha os dados abaixo para cadastrar ou editar um usuário.
              </p>
            </div>
          </div>

          <a
            th:href="@{/usuarios/listar}"
            class="inline-flex items-center justify-center gap-2 rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 shadow-sm transition hover:bg-slate-100"
            role="button"
          >
            <ion-icon name="list-outline" class="text-lg"></ion-icon>
            <span th:text="#{usuario.listar.label}">Listar Usuários</span>
          </a>
        </div>

        <div th:replace="~{fragments/alert}"></div>

        <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
          <form
            th:action="${usuario.id == null} ? @{/usuarios/salvar} : @{/usuarios/editar}"
            th:object="${usuario}"
            method="POST"
            class="space-y-6"
          >
            <div class="grid gap-6 md:grid-cols-2">
              <div>
                <label
                  for="email"
                  class="mb-1 block text-sm font-medium text-slate-700"
                  th:text="#{usuario.email.label}"
                >
                  E-mail
                </label>

                <input
                  type="email"
                  id="email"
                  autofocus="autofocus"
                  th:field="*{email}"
                  th:placeholder="#{login.email.placeholder}"
                  th:classappend="${#fields.hasErrors('email')} ? ' border-red-500 focus:border-red-500 focus:ring-red-200'"
                  class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-slate-500 focus:ring-2 focus:ring-slate-200"
                />

                <p
                  class="mt-1 text-sm text-red-600"
                  th:if="${#fields.hasErrors('email')}"
                  th:errors="*{email}"
                ></p>
              </div>

              <div>
                <label
                  for="password"
                  class="mb-1 block text-sm font-medium text-slate-700"
                  th:text="${usuario.id == null} ? #{usuario.password.label} : #{senha.nova.label}"
                >
                  Senha
                </label>

                <!-- Cadastro: senha obrigatória -->
                <input
                  th:if="${usuario.id == null}"
                  type="password"
                  id="password"
                  th:field="*{password}"
                  th:placeholder="#{login.password.placeholder}"
                  th:classappend="${#fields.hasErrors('password')} ? ' border-red-500 focus:border-red-500 focus:ring-red-200'"
                  class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-slate-500 focus:ring-2 focus:ring-slate-200"
                />

                <!-- Edição: mantém a senha atual e permite trocá-la opcionalmente -->
                <input
                  th:if="${usuario.id != null}"
                  type="hidden"
                  th:field="*{password}"
                />
                <input
                  th:if="${usuario.id != null}"
                  type="password"
                  id="password"
                  name="novoPassword"
                  th:placeholder="#{senha.nova.placeholder}"
                  class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-slate-500 focus:ring-2 focus:ring-slate-200"
                />

                <p
                  class="mt-1 text-sm text-red-600"
                  th:if="${#fields.hasErrors('password')}"
                  th:errors="*{password}"
                ></p>
              </div>
            </div>

            <div>
              <label
                for="role"
                class="mb-1 block text-sm font-medium text-slate-700"
                th:text="#{usuario.role.label}"
              >
                Papel
              </label>

              <select
                id="role"
                th:field="*{role}"
                th:classappend="${#fields.hasErrors('role')} ? ' border-red-500 focus:border-red-500 focus:ring-red-200'"
                class="block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm outline-none transition focus:border-slate-500 focus:ring-2 focus:ring-slate-200"
              >
                <option value="ROLE_ADMIN">ROLE_ADMIN</option>
                <option value="ROLE_CLIENTE">ROLE_CLIENTE</option>
                <option value="ROLE_IMOBILIARIA">ROLE_IMOBILIARIA</option>
              </select>

              <p
                class="mt-1 text-sm text-red-600"
                th:if="${#fields.hasErrors('role')}"
                th:errors="*{role}"
              ></p>
            </div>

            <input type="hidden" id="id" th:field="*{id}" />

            <div class="flex justify-end border-t border-slate-200 pt-6">
              <button
                type="submit"
                class="cursor-pointer inline-flex items-center justify-center gap-2 rounded-lg bg-slate-900 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:ring-offset-2"
              >
                <ion-icon name="save-outline" class="text-lg"></ion-icon>
                <span th:text="#{button.salvar.label}">Salvar</span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </section>
  </body>
</html>
